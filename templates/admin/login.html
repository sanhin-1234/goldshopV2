<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | GY JEWELRY</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<main class="admin-login-page">

    <section class="admin-login-card">

        <p class="admin-login-label">GY JEWELRY ADMIN</p>

        <h1>관리자 로그인</h1>

        <p class="admin-login-sub">
            관리자만 접근할 수 있는 페이지입니다.
        </p>

        {% if error %}
            <div class="admin-login-error">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" class="admin-login-form">

            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

            <div class="admin-login-field">
                <label>아이디</label>
                <input type="text" name="username" required>
            </div>

            <div class="admin-login-field">
                <label for="adminLoginPassword">비밀번호</label>

                <div class="admin-password-wrap">
                    <input
                        type="password"
                        id="adminLoginPassword"
                        name="password"
                        required
                    >

                    <button
                        type="button"
                        class="admin-password-eye"
                        id="adminPasswordEye"
                        aria-label="비밀번호 보기"
                    >
                        <!-- 눈 감음: 숨김 상태 -->
                        <svg class="admin-eye-icon admin-eye-closed" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M3 12s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                            <line x1="4" y1="20" x2="20" y2="4"></line>
                        </svg>

                        <!-- 눈 뜸: 보임 상태 -->
                        <svg class="admin-eye-icon admin-eye-open" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M3 12s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit">
                LOGIN
            </button>

        </form>

        <a href="/" class="admin-login-home">
            홈으로 돌아가기
        </a>

    </section>

</main>

<script>
    const adminLoginPassword = document.getElementById("adminLoginPassword");
    const adminPasswordEye = document.getElementById("adminPasswordEye");

    if (adminLoginPassword && adminPasswordEye) {
        adminPasswordEye.addEventListener("click", function () {
            const isHidden = adminLoginPassword.type === "password";

            adminLoginPassword.type = isHidden ? "text" : "password";

            adminPasswordEye.classList.toggle("is-visible", isHidden);

            adminPasswordEye.setAttribute(
                "aria-label",
                isHidden ? "비밀번호 숨기기" : "비밀번호 보기"
            );
        });
    }
</script>

</body>
</html>
